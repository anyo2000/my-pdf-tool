{% extends "base.html" %}
{% block title %}페이지 회전 - PDF Tool{% endblock %}
{% block content %}
<div class="page-header">
    <h2>페이지 회전</h2>
    <p>PDF 페이지를 원하는 각도로 회전합니다.</p>
</div>

<div class="upload-zone" id="uploadZone">
    <div class="upload-zone-icon">🔄</div>
    <div class="upload-zone-text">PDF 파일을 드래그하거나 클릭하여 선택</div>
    <div class="upload-zone-hint">최대 100MB</div>
    <input type="file" id="fileInput" accept=".pdf">
</div>

<div id="optionsArea" style="display:none;">
    <div class="file-list" id="fileList"></div>
    <div class="options-group">
        <div class="options-row">
            <div>
                <label for="pageSelect">대상 페이지</label>
                <input type="text" id="pageSelect" value="all" placeholder="all 또는 1,2,3">
                <div class="upload-zone-hint" style="margin-top:4px;">'all' 또는 페이지 번호 (예: 1,3,5-7)</div>
            </div>
            <div>
                <label>회전 각도</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="angle" id="angle90" value="90" checked>
                        <label for="angle90">90°</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="angle" id="angle180" value="180">
                        <label for="angle180">180°</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="angle" id="angle270" value="270">
                        <label for="angle270">270°</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="action-bar">
        <button class="btn btn-primary" id="rotateBtn">회전하기</button>
    </div>
</div>

<div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner"></div></div>
    <div class="progress-text"></div>
</div>

<div class="error-msg"></div>

<div class="result-area">
    <div class="result-card">
        <div class="result-info">회전이 완료되었습니다.</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    let file = null;

    setupUploadZone('uploadZone', 'fileInput', {
        onFiles: function(files) {
            if (!validateFileSize(files[0])) return;
            hideError();
            file = files[0];
            document.getElementById('fileList').innerHTML =
                `<div class="file-item"><span class="file-item-name">${file.name}</span><span class="file-item-size">${formatFileSize(file.size)}</span></div>`;
            document.getElementById('optionsArea').style.display = 'block';
        }
    });

    document.getElementById('rotateBtn').addEventListener('click', async function() {
        if (!file) return;
        hideError();
        hideResult();
        this.disabled = true;

        const pages = document.getElementById('pageSelect').value.trim();
        const angle = document.querySelector('input[name="angle"]:checked').value;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('pages', pages);
        formData.append('angle', angle);

        try {
            const result = await uploadFiles('/api/rotate', formData, { responseType: 'blob' });
            downloadBlob(result.blob, result.filename || 'rotated.pdf');
            showResult();
        } catch (e) {
            showError(e.message);
        } finally {
            resetProgress();
            this.disabled = false;
        }
    });
})();
</script>
{% endblock %}
