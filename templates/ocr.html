{% extends "base.html" %}
{% block title %}OCR - PDF Tool{% endblock %}
{% block content %}
<div class="page-header">
    <h2>OCR 텍스트 추출</h2>
    <p>PDF에서 텍스트를 인식하여 추출합니다.</p>
</div>

<div class="upload-zone" id="uploadZone">
    <div class="upload-zone-icon">🔍</div>
    <div class="upload-zone-text">PDF 파일을 드래그하거나 클릭하여 선택</div>
    <div class="upload-zone-hint">최대 100MB</div>
    <input type="file" id="fileInput" accept=".pdf">
</div>

<div id="optionsArea" style="display:none;">
    <div class="file-list" id="fileList"></div>
    <div class="options-group">
        <label>인식 언어</label>
        <div class="radio-group">
            <div class="radio-option">
                <input type="radio" name="lang" id="langBoth" value="kor+eng" checked>
                <label for="langBoth">한국어 + 영어</label>
            </div>
            <div class="radio-option">
                <input type="radio" name="lang" id="langKor" value="kor">
                <label for="langKor">한국어</label>
            </div>
            <div class="radio-option">
                <input type="radio" name="lang" id="langEng" value="eng">
                <label for="langEng">영어</label>
            </div>
        </div>
    </div>
    <div class="action-bar">
        <button class="btn btn-primary" id="ocrBtn">텍스트 추출</button>
    </div>
</div>

<div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner"></div></div>
    <div class="progress-text"></div>
</div>

<div class="error-msg"></div>

<div class="result-area">
    <div class="result-card">
        <div class="result-info" id="resultInfo"></div>
        <div class="ocr-output" id="ocrOutput"></div>
        <div class="action-bar">
            <button class="btn btn-primary" id="copyBtn">텍스트 복사</button>
            <button class="btn btn-success" id="downloadTxtBtn">TXT 다운로드</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    let file = null;
    let extractedText = '';

    setupUploadZone('uploadZone', 'fileInput', {
        onFiles: function(files) {
            if (!validateFileSize(files[0])) return;
            hideError();
            file = files[0];
            document.getElementById('fileList').innerHTML =
                `<div class="file-item"><span class="file-item-name">${file.name}</span><span class="file-item-size">${formatFileSize(file.size)}</span></div>`;
            document.getElementById('optionsArea').style.display = 'block';
        }
    });

    document.getElementById('ocrBtn').addEventListener('click', async function() {
        if (!file) return;
        hideError();
        hideResult();
        this.disabled = true;

        const lang = document.querySelector('input[name="lang"]:checked').value;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('lang', lang);

        try {
            const result = await uploadFiles('/api/ocr', formData);
            extractedText = result.text;
            document.getElementById('resultInfo').textContent =
                `${result.pages}페이지에서 텍스트를 추출했습니다.`;
            document.getElementById('ocrOutput').textContent = extractedText;
            showResult();
        } catch (e) {
            showError(e.message);
        } finally {
            resetProgress();
            this.disabled = false;
        }
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(extractedText).then(() => {
            this.textContent = '복사됨!';
            setTimeout(() => { this.textContent = '텍스트 복사'; }, 2000);
        });
    });

    document.getElementById('downloadTxtBtn').addEventListener('click', function() {
        const blob = new Blob([extractedText], { type: 'text/plain;charset=utf-8' });
        downloadBlob(blob, 'ocr_result.txt');
    });
})();
</script>
{% endblock %}
