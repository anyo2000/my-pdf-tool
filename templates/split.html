{% extends "base.html" %}
{% block title %}PDF 분할 - PDF Tool{% endblock %}
{% block content %}
<div class="page-header">
    <h2>PDF 분할</h2>
    <p>PDF에서 원하는 페이지만 추출합니다.</p>
</div>

<div class="upload-zone" id="uploadZone">
    <div class="upload-zone-icon">✂️</div>
    <div class="upload-zone-text">PDF 파일을 드래그하거나 클릭하여 선택</div>
    <div class="upload-zone-hint">최대 100MB</div>
    <input type="file" id="fileInput" accept=".pdf">
</div>

<div id="optionsArea" style="display:none;">
    <div class="file-list" id="fileList"></div>
    <div class="options-group">
        <label for="pageRange">페이지 범위</label>
        <input type="text" id="pageRange" placeholder="예: 1-3, 5, 7-9">
        <div class="upload-zone-hint" style="margin-top:4px;">쉼표로 구분, 범위는 하이픈 사용 (1-based)</div>
    </div>
    <div class="action-bar">
        <button class="btn btn-primary" id="splitBtn">분할하기</button>
    </div>
</div>

<div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner"></div></div>
    <div class="progress-text"></div>
</div>

<div class="error-msg"></div>

<div class="result-area">
    <div class="result-card">
        <div class="result-info">분할이 완료되었습니다.</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    let file = null;

    setupUploadZone('uploadZone', 'fileInput', {
        onFiles: function(files) {
            if (!validateFileSize(files[0])) return;
            hideError();
            file = files[0];
            document.getElementById('fileList').innerHTML =
                `<div class="file-item"><span class="file-item-name">${file.name}</span><span class="file-item-size">${formatFileSize(file.size)}</span></div>`;
            document.getElementById('optionsArea').style.display = 'block';
        }
    });

    document.getElementById('splitBtn').addEventListener('click', async function() {
        if (!file) return;
        const pages = document.getElementById('pageRange').value.trim();
        if (!pages) { showError('페이지 범위를 입력해주세요.'); return; }

        hideError();
        hideResult();
        this.disabled = true;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('pages', pages);

        try {
            const result = await uploadFiles('/api/split', formData, { responseType: 'blob' });
            downloadBlob(result.blob, result.filename || 'split.pdf');
            showResult();
        } catch (e) {
            showError(e.message);
        } finally {
            resetProgress();
            this.disabled = false;
        }
    });
})();
</script>
{% endblock %}
