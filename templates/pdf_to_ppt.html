{% extends "base.html" %}
{% block title %}PDF → PPT - PDF Tool{% endblock %}
{% block content %}
<div class="page-header">
    <h2>PDF → PPT</h2>
    <p>PDF를 파워포인트 프레젠테이션으로 변환합니다.</p>
</div>

<div class="upload-zone" id="uploadZone">
    <div class="upload-zone-icon">📊</div>
    <div class="upload-zone-text">PDF 파일을 드래그하거나 클릭하여 선택</div>
    <div class="upload-zone-hint">최대 100MB</div>
    <input type="file" id="fileInput" accept=".pdf">
</div>

<div id="optionsArea" style="display:none;">
    <div class="file-list" id="fileList"></div>
    <div class="options-group">
        <label for="dpi">이미지 품질 (DPI)</label>
        <select id="dpi">
            <option value="150">150 DPI (빠름, 작은 파일)</option>
            <option value="200" selected>200 DPI (권장)</option>
            <option value="300">300 DPI (고품질, 큰 파일)</option>
        </select>
    </div>
    <div class="action-bar">
        <button class="btn btn-primary" id="convertBtn">변환하기</button>
    </div>
</div>

<div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner"></div></div>
    <div class="progress-text"></div>
</div>

<div class="error-msg"></div>

<div class="result-area">
    <div class="result-card">
        <div class="result-info">PPT 변환이 완료되었습니다.</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    let file = null;

    setupUploadZone('uploadZone', 'fileInput', {
        onFiles: function(files) {
            if (!validateFileSize(files[0])) return;
            hideError();
            file = files[0];
            document.getElementById('fileList').innerHTML =
                `<div class="file-item"><span class="file-item-name">${file.name}</span><span class="file-item-size">${formatFileSize(file.size)}</span></div>`;
            document.getElementById('optionsArea').style.display = 'block';
        }
    });

    document.getElementById('convertBtn').addEventListener('click', async function() {
        if (!file) return;
        hideError();
        hideResult();
        this.disabled = true;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('dpi', document.getElementById('dpi').value);

        try {
            const result = await uploadFiles('/api/pdf-to-ppt', formData, { responseType: 'blob' });
            downloadBlob(result.blob, result.filename || 'presentation.pptx');
            showResult();
        } catch (e) {
            showError(e.message);
        } finally {
            resetProgress();
            this.disabled = false;
        }
    });
})();
</script>
{% endblock %}
